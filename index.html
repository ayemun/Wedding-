<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayemun ♥ Usaid</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(to bottom, #f5e6d3, #e0c3a3);
  color: #5a4634;
  overflow-x: hidden;
}

section {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 1.5s ease;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

.petal {
  position: fixed;
  top: -10px;
  width: 8px;
  height: 8px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>

<section>
  <h2>بِسْمِ ٱللّٰهِ ٱلرَّحْمٰنِ ٱلرَّحِيْمِ</h2>
  <h1>Ayemun Khan ♥ Usaid Khan</h1>
  <p>With the blessings of Allah, two hearts find peace in each other.</p>
</section>

<section class="fade">
  <h1>Events</h1>
  <p>
    <b>July 25</b><br>
    Mehndi: 4–6 PM<br>
    Sangeet: 7:30 onwards<br><br>

    <b>July 26</b><br>
    Haldi: 11–1 PM<br>
    Nikah & Valima: 5 PM onwards
  </p>
</section>

<section class="fade">
  <h1>Venue</h1>
  <p>Grande Bay Resort, Chennai</p>
</section>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const rect = el.getBoundingClientRect();
    if(rect.top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

function createPetal() {
  const petal = document.createElement('div');
  petal.classList.add('petal');
  petal.style.left = Math.random() * 100 + 'vw';
  petal.style.animationDuration = (5 + Math.random() * 5) + 's';
  document.body.appendChild(petal);

  setTimeout(() => petal.remove(), 10000);
}

setInterval(createPetal, 400);
</script>

</body>
</html>
